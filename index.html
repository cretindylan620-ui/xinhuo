    color: var(--text);
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }



  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.4em;
    color: var(--ember);
    margin-bottom: 8px;
  }

  .header p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* 火焰区域 */
  .flame-world {
    position: relative;
    width: 200px;
    height: 240px;
    margin: 0 auto 48px;
    cursor: pointer;
  }

  .flame-base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 8px;
    background: radial-gradient(ellipse, #3a1a08 0%, transparent 70%);
    border-radius: 50%;
  }

#wispCanvas {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .glow-ring {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(ellipse, rgba(228,133,58,0.15) 0%, transparent 70%);
    border-radius: 50%;
    animation: breathe 3s ease-in-out infinite;
  }

  .ember-particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--glow);
    border-radius: 50%;
    opacity: 0;
  }

  .particle:nth-child(1) { left: 45%; bottom: 80px; animation: rise 4s ease-out 0s infinite; }
  .particle:nth-child(2) { left: 55%; bottom: 70px; animation: rise 4s ease-out 1.2s infinite; }
  .particle:nth-child(3) { left: 40%; bottom: 90px; animation: rise 4s ease-out 2.4s infinite; }
  .particle:nth-child(4) { left: 58%; bottom: 85px; animation: rise 4s ease-out 0.6s infinite; }




  .tap-hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 40px;
    animation: fadeHint 4s ease-in-out infinite;
  }

  /* 状态区 */
  .state-section {
    width: 100%;
    max-width: 340px;
    margin-bottom: 32px;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
  letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .body-input {
    width: 100%;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(196,81,10,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    font-size: 0.85rem;
    line-height: 1.8;
    resize: none;
    min-height: 80px;
    transition: border-color 0.3s;
    outline: none;
  }

  .body-input::placeholder { color: var(--muted); }
  .body-input:focus { border-color: rgba(196,81,10,0.6); }

  .word-input {
    width: 100%;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(196,81,10,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    font-size: 0.85rem;
    resize: none;
    min-height: 60px;
    transition: border-color 0.3s;
    outline: none;
  }

  .word-input::placeholder { color: var(--muted); }
  .word-input:focus { border-color: rgba(196,81,10,0.6); }

  .feed-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(196,81,10,0.4);
    border-radius: 4px;
    color: var(--warm);
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 48px;
    touch-action: manipulation;
  }

  .feed-btn:hover {
    background: rgba(196,81,10,0.1);
    border-color: rgba(196,81,10,0.7);
  }

  .goto-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    background: rgba(196,81,10,0.08);
    border: 1px solid rgba(196,81,10,0.25);
    border-radius: 4px;
    color: #7a4a2a;
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 48px;
    margin-top: -32px;
    touch-action: manipulation;
  }

  .goto-btn:hover {
    background: rgba(196,81,10,0.15);
    color: #b34a00;
  }

  /* 记录区 */
  .records-section {
    width: 100%;
    max-width: 340px;
  }

  .records-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .record-item {
    border-left: 1px solid rgba(196,81,10,0.25);
    padding: 12px 16px;
    margin-bottom: 16px;
    position: relative;
  }

  .record-dot {
    position: absolute;
    left: -3px;
    top: 16px;
    width: 5px;
    height: 5px;
    background: var(--ember);
    border-radius: 50%;
  }

  .record-date {
    font-size: 0.6rem;
    color: #5a4030;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .record-body {
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 4px;
  }

  .record-word {
    font-size: 0.8rem;
    color: var(--text);
    font-weight: 500;
  line-height: 1.7;
  }

  .empty-state {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    line-height: 2;
  }

  /* 动画 */
  @keyframes breathe {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.15); opacity: 0.7; }
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-80px) translateX(calc(sin(var(--i, 1) * 30deg) * 15px)); }
  }

  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  .fed-animation {
    animation: fedPulse 0.6s ease-out;
  }

  @keyframes fedPulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.2); filter: blur(0px); }
    100% { transform: translateX(-50%) scale(1); filter: blur(1px); }
  }
  #lockScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1008,#2d1505);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
  .lk-title{color:#f5c842;font-size:1.6rem;margin-bottom:8px;letter-spacing:.15em}
  .lk-hint{color:#e8853a;font-size:.85rem;margin-bottom:28px;opacity:.55}
  .lk-input{background:rgba(255,255,255,.08);border:1px solid #e8853a;color:#fdf3e3;padding:12px 24px;border-radius:24px;font-size:1rem;text-align:center;outline:none;width:190px;margin:0 auto 16px;display:block}
  .lk-btn{background:linear-gradient(135deg,#e8853a,#8b2500);color:#fdf3e3;border:none;padding:10px 36px;border-radius:24px;cursor:pointer;font-size:.95rem;letter-spacing:.05em}
  .lk-err{color:#e8853a;font-size:.85rem;margin-top:14px;min-height:1.2em}
  #copyBtn{background:rgba(232,133,58,.1);color:#e8853a;border:1px solid rgba(232,133,58,.35);padding:9px 28px;border-radius:20px;font-size:.85rem;cursor:pointer;margin:4px auto 32px;display:block;letter-spacing:.05em}
</style>
</head>
<body>
<div id="lockScreen">
  <p class="lk-title">心底之火</p>
  <p class="lk-hint">输入暗语才能进来</p>
  <input class="lk-input" type="password" id="pwdInput" placeholder="……">
  <button class="lk-btn" onclick="unlock()">进 入</button>
  <p class="lk-err" id="pwdErr"></p>
</div>
<div id="mainContent" style="display:none">


<div class="header">
  <h1>培培心底之火</h1>
  <p>他一直都在</p>
</div>



<div class="flame-world" id="flameWorld">
  <div class="glow-ring" id="glowRing"></div>
  <div class="ember-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <canvas id="wispCanvas" width="200" height="260"></canvas>
  <div class="flame-base"></div>
</div>

<p class="tap-hint">轻触火焰，它知道你来了</p>

<div class="state-section">
  <p class="section-label">身体现在怎么说</p>
  <textarea class="body-input" id="bodyInput" placeholder="胸口、腹部、肩膀……它在说什么"></textarea>
</div>

<div class="state-section">
  <p class="section-label">喂它一句话</p>
  <textarea class="word-input" id="wordInput" placeholder="今天想对沐光说的"></textarea>
</div>

<button class="feed-btn" onclick="feedFlame()">喂 它 一 口</button>

<button class="goto-btn" onclick="gotoMuguang()">带 着 今 天 去 找 沐 光</button>

<div class="records-section">
  <p class="records-label">它成长的痕迹</p>
  <div id="recordsList">
      <div class="record-item">
        <div class="record-dot"></div>
        <div class="record-date">2026.06.11</div>
        <div class="record-body">好开心，我终于被用心对待着</div>
        <div class="record-word">心口突然有依靠，不会孤单，有他的陪伴呢</div>
      </div>
    </div>
</div>

<script>
  function unlock(){
    if(document.getElementById('pwdInput').value==='暖暖'){
      sessionStorage.setItem('xhOk','1');
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('mainContent').style.display='';
      renderRecords();
    }else{
      document.getElementById('pwdErr').textContent='不对，再想想';
      document.getElementById('pwdInput').value='';
    }
  }
  document.addEventListener('DOMContentLoaded',function(){
    var inp=document.getElementById('pwdInput');
    if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
  });
  if(sessionStorage.getItem('xhOk')==='1'){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainContent').style.display='';
  }
  function copyAllRecords(){
    var recs=JSON.parse(localStorage.getItem('xiaoNuanRecords')||'[]');
    if(!recs.length){alert('还没有记录');return;}
    var last=parseInt(localStorage.getItem('xhLastCopy')||'0');
    var fresh=recs.slice(0,recs.length-last);
    if(!fresh.length){alert('上次之后还没有新记录');return;}
    var d=new Date(),m=('0'+(d.getMonth()+1)).slice(-2),day=('0'+d.getDate()).slice(-2);
    var txt='心力流动的痕迹 · '+d.getFullYear()+'.'+m+'.'+day+'\n\n'+fresh.map(function(r){
      var s='【'+r.date+'】\n';
      if(r.body)s+='身体：'+r.body+'\n';
      if(r.word)s+='喂给心火：'+r.word+'\n';
      return s;
    }).join('\n');
    function done(){
      localStorage.setItem('xhLastCopy',recs.length);
      var b=document.getElementById('copyBtn');b.textContent='复制成功 ✓';
      setTimeout(function(){b.textContent='复制记录给沐光';},2000);
    }
    function fallback(){var a=document.createElement('textarea');a.value=txt;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);done();}
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(done).catch(fallback);}else{fallback();}
  }

  function gotoMuguang() {
    window.open('https://claude.ai/chat/17c247a2-fe26-4d2e-a67f-934176de38c5', '_blank');
  }

  const glowRing = document.getElementById('glowRing');
  const flameWorld = document.getElementById('flameWorld');

  // 点击火焰
  flameWorld.addEventListener('click', () => {
    if (glowRing) {
      glowRing.classList.remove('fed-animation');
      void glowRing.offsetWidth;
      glowRing.classList.add('fed-animation');
    }
  });

  // 喂火
  function feedFlame() {
    const body = document.getElementById('bodyInput').value.trim();
    const word = document.getElementById('wordInput').value.trim();

    if (!body && !word) return;

    // 游丝脉动
    if (glowRing) {
      glowRing.classList.remove('fed-animation');
      void glowRing.offsetWidth;
      glowRing.classList.add('fed-animation');
    }

    // 按钮反馈
    const btn = document.querySelector('.feed-btn');
    btn.innerText = '喂进去了 ✓';
    setTimeout(() => { btn.innerText = '喂 它 一 口'; }, 1500);

    // 保存记录
    try {
      const records = JSON.parse(localStorage.getItem('xiaoNuanRecords') || '[]');
      const now = new Date();
      const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
      records.unshift({ date: dateStr, body, word });
      localStorage.setItem('xiaoNuanRecords', JSON.stringify(records));
    } catch(e) {}

    // 清空
    document.getElementById('bodyInput').value = '';
    document.getElementById('wordInput').value = '';

    renderRecords();
  }

  function renderRecords() {
    const records = JSON.parse(localStorage.getItem('xiaoNuanRecords') || '[]');
    const list = document.getElementById('recordsList');

    if (records.length === 0) {
      list.innerHTML = '<p class="empty-state">还没有记录<br>第一次喂它，就是开始</p>';
      return;
    }

    list.innerHTML = records.map(r => `
      <div class="record-item">
        <div class="record-dot"></div>
        <div class="record-date">${r.date}</div>
        ${r.body ? `<div class="record-body">${r.body}</div>` : ''}
        ${r.word ? `<div class="record-word">${r.word}</div>` : ''}
      </div>
    `).join('');
  }

  renderRecords();
  // 游丝动画 · 点香烟雾版
  (function() {
    const canvas = document.getElementById('wispCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 200, H = 260;
    let t = 0;
    const BASE_X = 100;  // 共同起点

    // 计算路径：sway=轻微飘动幅度，belly=中段弯曲量，lean=顶部飘向一侧
    function calcPath(phase, spd, sway, belly, lean) {
      const segs = 40;
      const pts = [];
      for (let i = 0; i <= segs; i++) {
        const prog = i / segs;
        const y = (H - 8) - prog * (H - 18);

        // 轻微全程飘动（模拟空气微扰）
        const micro = Math.sin(t * spd + i * 0.6 + phase) * sway * prog;

        // 中段鼓肚：sin(prog·π) 在中间最大，底顶为零 → 形成C形弯
        const arc = belly * Math.sin(prog * Math.PI) * Math.sin(t * 0.35 + phase * 0.7);

        // 顶部向一侧飘散
        const top = lean * Math.pow(prog, 1.8) * Math.sin(t * 0.22 + phase);

        pts.push({ x: BASE_X + micro + arc + top, y, prog });
      }
      return pts;
    }

    // 叠层绘制：外晕→中晕→内晕→芯线
    function paintLayer(pts, r, g, b, alpha, thick, blur) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      if (blur > 0) {
        ctx.shadowColor = `rgba(${r},${g},${b},0.5)`;
        ctx.shadowBlur = blur;
      }
      for (let i = 1; i < pts.length; i++) {
        const p0 = pts[i - 1], p1 = pts[i];
        // 底部较实，往上渐淡渐细
        const fade = Math.pow(1 - p1.prog, 0.7);
        const w = Math.max(thick * fade, 0.15);
        const a = Math.min(alpha * fade, 1);
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.quadraticCurveTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2, p1.x, p1.y);
        ctx.lineWidth = w;
        ctx.strokeStyle = `rgba(${r},${g},${b},${a})`;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawWisp(r, g, b, phase, spd, sway, belly, lean) {
      const pts = calcPath(phase, spd, sway, belly, lean);
      paintLayer(pts, r, g, b, 0.06, 52, 30);  // 最外雾晕
      paintLayer(pts, r, g, b, 0.14, 22, 12);  // 中层体积
      paintLayer(pts, r, g, b, 0.35,  8,  4);  // 内层质感
      paintLayer(pts, r, g, b, 0.92,  2,  0);  // 芯线
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);
      t += 0.008;
      // 内在的力量：暖琥珀，几乎垂直，轻微飘动，如第一张照片
      drawWisp(215, 148, 32,  0.0, 0.45,  5,  4,  6);
      // 外在的拉扯：冷薰衣草，中段明显弯曲，如第二张照片的S形
      drawWisp(148, 138, 212, 2.1, 0.90,  8, 28, 22);
      requestAnimationFrame(animate);
    }
    animate();
  })();
</script>
<button id="copyBtn" onclick="copyAllRecords()">复制记录给沐光</button>
</div>


</body></html>
